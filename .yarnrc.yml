# Allow-list of git repositories permitted as dependency sources. `"**"`
# matches any repo, which permits installing packages straight from git and
# bypasses the registry — consider narrowing this to specific repos (or
# removing it) to keep installs registry-only.
approvedGitRepositories:
  - "**"

# Supply-chain hardening: don't run dependencies' install/postinstall build
# scripts by default, so a compromised package can't execute code at install
# time. Packages that genuinely need to build are allow-listed per-package via
# dependenciesMeta.<pkg>.built in package.json (e.g. esbuild).
enableScripts: false

# Install dependencies into a classic node_modules tree (instead of Yarn's
# Plug'n'Play), keeping tooling and editors that expect node_modules working.
nodeLinker: node-modules

# Supply-chain mitigation: refuse npm versions published less than 3 days ago
# during add/upgrade (stronger than Yarn's 24h default), reducing exposure to
# a freshly published, quickly-pulled compromised release. Immutable installs
# of already-locked versions are unaffected.
npmMinimalAgeGate: 3d

# Pin the exact Yarn release used for this repo, committed under .yarn/releases
# so every contributor and CI run uses the same Yarn version.
yarnPath: .yarn/releases/yarn-4.15.0.cjs
